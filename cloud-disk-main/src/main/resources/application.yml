spring:
  application:
    name: cloud-disk-main
  datasource:
    url: jdbc:mysql://localhost:3306/cloud_disk?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 32
          max-wait: 500ms
          max-idle: 16
          min-idle: 4
          time-between-eviction-runs: 60000ms
          min-evictable-idle-time: 300000ms
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        concurrency: 3
        max-concurrency: 10

server:
  port: 8080

offline:
  download:
    rabbitmq:
      exchange: offline.download.exchange
      routing-key: offline.download.routing
      queue: offline.download.queue
    callback:
      secret: offline-callback-secret-2024
    redis:
      task-prefix: offline:task:
      ttl: 86400
